<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    .game-wrapper {
      background: #111;
      padding: 2rem;
      border-radius: 1rem;
      border: 1px solid #00ff41;
      box-shadow: 0 0 40px rgba(0,255,65,0.1);
    }
    canvas {
      display: block;
      margin: 0 auto;
      border: 2px solid #00ff41;
      border-radius: 4px;
      image-rendering: pixelated;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      color: #00ff41;
    }
    .score { font-size: 1.5rem; font-weight: bold; }
    .restart-btn {
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .restart-btn:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 20px rgba(0,255,65,0.3);
    }
    .overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      border-radius: 1rem;
    }
    .overlay.show { display: flex; }
    .overlay h2 { color: #00ff41; font-size: 2rem; }
    .overlay p { color: #888; font-size: 1.1rem; }
    .container { position: relative; }
    .controls-hint {
      color: #555;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }
    .high-score { color: #ffd700; font-size: 1rem; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <div>
        <div class="score">SCORE: <span id="score">0</span></div>
        <div class="high-score">BEST: <span id="highScore">0</span></div>
      </div>
      <button class="restart-btn" id="restartBtn">↻ NOVO</button>
    </div>
    <div class="container">
      <canvas id="game" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2>GAME OVER</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="startBtn">▶ JOGAR</button>
      </div>
    </div>
    <div class="controls-hint">↑ ↓ ← → ou WASD</div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const finalScoreEl = document.getElementById('finalScore');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    const GRID = 20;
    const TILE = canvas.width / GRID;
    let snake, direction, nextDirection, food, score, highScore, gameLoop, gameRunning;

    function init() {
      snake = [{x: 10, y: 10}];
      direction = {x: 1, y: 0};
      nextDirection = {x: 1, y: 0};
      score = 0;
      gameRunning = false;
      highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
      highScoreEl.textContent = highScore;
      spawnFood();
      overlay.classList.add('show');
      startBtn.textContent = '▶ JOGAR';
      overlay.querySelector('h2').textContent = 'SNAKE';
      finalScoreEl.textContent = '0';
      draw();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function draw() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = 0.1;
      for (let i = 0; i <= GRID; i++) {
        ctx.beginPath();
        ctx.moveTo(i * TILE, 0);
        ctx.lineTo(i * TILE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * TILE);
        ctx.lineTo(canvas.width, i * TILE);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Food
      ctx.fillStyle = '#ff0044';
      ctx.shadowColor = '#ff0044';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      const cx = food.x * TILE + TILE/2;
      const cy = food.y * TILE + TILE/2;
      ctx.arc(cx, cy, TILE/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const gradient = 1 - (i / snake.length) * 0.5;
        ctx.fillStyle = `rgba(0, 255, 65, ${gradient})`;
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur = i === 0 ? 15 : 5;
        const padding = i === 0 ? 1 : 2;
        ctx.fillRect(seg.x * TILE + padding, seg.y * TILE + padding, TILE - padding*2, TILE - padding*2);
        // Eyes on head
        if (i === 0) {
          ctx.fillStyle = '#000';
          ctx.shadowBlur = 0;
          const eyeSize = 3;
          let ex1, ey1, ex2, ey2;
          if (direction.x === 1) { ex1 = 14; ey1 = 6; ex2 = 14; ey2 = 14; }
          else if (direction.x === -1) { ex1 = 6; ey1 = 6; ex2 = 6; ey2 = 14; }
          else if (direction.y === -1) { ex1 = 6; ey1 = 6; ex2 = 14; ey2 = 6; }
          else { ex1 = 6; ey1 = 14; ex2 = 14; ey2 = 14; }
          ctx.fillRect(seg.x * TILE + ex1 - 1, seg.y * TILE + ey1 - 1, eyeSize, eyeSize);
          ctx.fillRect(seg.x * TILE + ex2 - 1, seg.y * TILE + ey2 - 1, eyeSize, eyeSize);
        }
      });
      ctx.shadowBlur = 0;
    }

    function update() {
      direction = {...nextDirection};
      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

      // Wall wrap
      if (head.x < 0) head.x = GRID - 1;
      if (head.x >= GRID) head.x = 0;
      if (head.y < 0) head.y = GRID - 1;
      if (head.y >= GRID) head.y = 0;

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      gameRunning = false;
      clearInterval(gameLoop);
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', String(highScore));
        highScoreEl.textContent = highScore;
      }
      finalScoreEl.textContent = score;
      overlay.querySelector('h2').textContent = 'GAME OVER';
      startBtn.textContent = '↻ NOVAMENTE';
      overlay.classList.add('show');
    }

    function startGame() {
      snake = [{x: 10, y: 10}];
      direction = {x: 1, y: 0};
      nextDirection = {x: 1, y: 0};
      score = 0;
      scoreEl.textContent = '0';
      gameRunning = true;
      spawnFood();
      overlay.classList.remove('show');
      draw();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 120);
    }

    document.addEventListener('keydown', (e) => {
      if (!gameRunning) return;
      const key = e.key;
      if ((key === 'ArrowUp' || key === 'w' || key === 'W') && direction.y !== 1)
        nextDirection = {x: 0, y: -1};
      else if ((key === 'ArrowDown' || key === 's' || key === 'S') && direction.y !== -1)
        nextDirection = {x: 0, y: 1};
      else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && direction.x !== 1)
        nextDirection = {x: -1, y: 0};
      else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && direction.x !== -1)
        nextDirection = {x: 1, y: 0};
      else if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        if (!gameRunning) startGame();
      }
    });

    // Touch controls for mobile
    let touchStart = null;
    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      touchStart = {x: touch.clientX, y: touch.clientY};
    });
    canvas.addEventListener('touchmove', (e) => e.preventDefault());
    canvas.addEventListener('touchend', (e) => {
      if (!touchStart || !gameRunning) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && direction.x !== -1) nextDirection = {x: 1, y: 0};
        else if (dx < 0 && direction.x !== 1) nextDirection = {x: -1, y: 0};
      } else {
        if (dy > 0 && direction.y !== -1) nextDirection = {x: 0, y: 1};
        else if (dy < 0 && direction.y !== 1) nextDirection = {x: 0, y: -1};
      }
      touchStart = null;
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', () => {
      if (gameRunning) {
        clearInterval(gameLoop);
        gameRunning = false;
      }
      startGame();
    });

    init();
  </script>
</body>
</html>

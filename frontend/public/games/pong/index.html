<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong Game</title>
 </title> <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    .game-wrapper {
      background: #111;
      padding: 2rem;
      border-radius: 1rem;
      border: 1px solid #00ff41;
      box-shadow: 0 0 40px rgba(0,255,65,0.1);
    }
    canvas {
      display: block;
      margin: 0 auto;
      border: 2px solid #00ff41;
      border-radius: 4px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      color: #00ff41;
    }
    .scores { font-size: 1.5rem; font-weight: bold; }
    .scores span { color: #888; }
    .restart-btn {
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .restart-btn:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 20px rgba(0,255,65,0.3);
    }
    .overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      border-radius: 1rem;
    }
    .overlay.show { display: flex; }
    .overlay h2 { color: #00ff41; font-size: 2rem; }
    .overlay p { color: #888; font-size: 1.1rem; }
    .container { position: relative; }
    .controls-hint {
      color: #555;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <div class="scores"><span id="leftScore">0</span> : <span id="rightScore">0</span></div>
      <button class="restart-btn" id="restartBtn">↻ NOVO</button>
    </div>
    <div class="container">
      <canvas id="game" width="600" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2>P</h2>ONG</h2>
        <p id="winnerMsg">Aperte JOGAR para começar</p>
        <button class="restart-btn" id="startBtn">▶ JOGAR</button>
      </div>
    </div>
    <div class="controls-hint">Jogador 1: W/S | Jogador 2: ↑/↓</div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const leftScoreEl = document.getElementById('leftScore');
    const rightScoreEl = document.getElementById('rightScore');
    const winnerMsg = document.getElementById('winnerMsg');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    const W = 600, H = 400;
    const PADDLE_W = 10, PADDLE_H = 60;
    const BALL_SIZE = 8;
    const WIN_SCORE = 5;

    let leftY, rightY, ballX, ballY, ballVX, ballVY;
    let leftScore, rightScore;
    let gameRunning, gameLoop;
    const PADDLE_SPEED = 5;
    let keys = {};

    function reset() {
      leftY = H/2 - PADDLE_H/2;
      rightY = H/2 - PADDLE_H/2;
      ballX = W/2;
      ballY = H/2;
      const angle = (Math.random() * Math.PI/3) - Math.PI/6;
      const speed = 5;
      ballVX = (Math.random() > 0.5 ? 1 : -1) * speed * Math.cos(angle);
      ballVY = speed * Math.sin(angle);
    }

    function init() {
      leftScore = 0;
      rightScore = 0;
      leftScoreEl.textContent = '0';
      rightScoreEl.textContent = '0';
      reset();
      gameRunning = false;
      draw();
      overlay.classList.add('show');
      startBtn.textContent = '▶ JOGAR';
      overlay.querySelector('h2').textContent = 'PONG';
      winnerMsg.textContent = 'Aperte JOGAR para começar';
    }

    function draw() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      // Center line
      ctx.setLineDash([5, 10]);
      ctx.strokeStyle = '#00ff41';
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(W/2, 0);
      ctx.lineTo(W/2, H);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;

      // Ball
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(ballX, ballY, BALL_SIZE/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Paddles
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#00ff41';

      // Left paddle
      ctx.fillRect(20, leftY, PADDLE_W, PADDLE_H);
      // Right paddle
      ctx.fillRect(W - 20 - PADDLE_W, rightY, PADDLE_W, PADDLE_H);
      ctx.shadowBlur = 0;
    }

    function update() {
      if (!gameRunning) return;

      // Move paddles
      if (keys['w'] || keys['W']) leftY = Math.max(0, leftY - PADDLE_SPEED);
      if (keys['s'] || keys['S']) leftY = Math.min(H - PADDLE_H, leftY + PADDLE_SPEED);
      if (keys['ArrowUp']) rightY = Math.max(0, rightY - PADDLE_SPEED);
      if (keys['ArrowDown']) rightY = Math.min(H - PADDLE_H, rightY + PADDLE_SPEED);

      // Move ball
      ballX += ballVX;
      ballY += ballVY;

      // Wall bounce (top/bottom)
      if (ballY - BALL_SIZE/2 <= 0 || ballY + BALL_SIZE/2 >= H) {
        ballVY = -ballVY;
        ballY = Math.max(BALL_SIZE/2, Math.min(H - BALL_SIZE/2, ballY));
      }

      // Left paddle collision
      if (ballX - BALL_SIZE/2 <= 20 + PADDLE_W &&
          ballX - BALL_SIZE/2 >= 20 &&
          ballY >= leftY && ballY <= leftY + PADDLE_H) {
        ballVX = -ballVX;
        ballX = 20 + PADDLE_W + BALL_SIZE/2;
        // Add spin based on hit position
        const hitPos = (ballY - leftY - PADDLE_H/2) / (PADDLE_H/2);
        ballVY += hitPos * 2;
      }

      // Right paddle collision
      if (ballX + BALL_SIZE/2 >= W - 20 - PADDLE_W &&
          ballX + BALL_SIZE/2 <= W - 20 &&
          ballY >= rightY && ballY <= rightY + PADDLE_H) {
        ballVX = -ballVX;
        ballX = W - 20 - PADDLE_W - BALL_SIZE/2;
        const hitPos = (ballY - rightY - PADDLE_H/2) / (PADDLE_H/2);
        ballVY += hitPos * 2;
      }

      // Scoring
      if (ballX < 0) {
        rightScore++;
        rightScoreEl.textContent = rightScore;
        if (rightScore >= WIN_SCORE) { gameOver('Jogador 2'); return; }
        reset();
        ballVX = -5;
      }
      if (ballX > W) {
        leftScore++;
        leftScoreEl.textContent = leftScore;
        if (leftScore >= WIN_SCORE) { gameOver('Jogador 1'); return; }
        reset();
        ballVX = 5;
      }

      // Clamp ball velocity
      const maxSpeed = 8;
      const speed = Math.sqrt(ballVX*ballVX + ballVY*ballVY);
      if (speed > maxSpeed) {
        ballVX = (ballVX / speed) * maxSpeed;
        ballVY = (ballVY / speed) * maxSpeed;
      }

      draw();
    }

    function gameOver(winner) {
      gameRunning = false;
      clearInterval(gameLoop);
      winnerMsg.textContent = `🏆 ${winner} venceu!`;
      overlay.querySelector('h2').textContent = 'FIM DE JOGO';
      startBtn.textContent = '↻ NOVAMENTE';
      overlay.classList.add('show');
    }

    function startGame() {
      leftScore = 0;
      rightScore = 0;
      leftScoreEl.textContent = '0';
      rightScoreEl.textContent = '0';
      reset();
      gameRunning = true;
      overlay.classList.remove('show');
      draw();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 1000/60);
    }

    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if ((e.key === ' ' || e.key === 'Enter') && !gameRunning) {
        e.preventDefault();
        startGame();
      }
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', () => {
      if (gameRunning) { clearInterval(gameLoop); gameRunning = false; }
      startGame();
    });

    init();
  </script>
</body>
</html>
